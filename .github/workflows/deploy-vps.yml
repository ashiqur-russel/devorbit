# Semi-automated CD (recommended):
#   1) Push to main → CI runs.
#   2) On successful CI (push to main), this workflow is queued; the deploy job
#      waits on the GitHub Environment "production" until someone approves
#      (Actions → pending deployment → Review deployments → Approve and deploy).
#   3) Or run manually: Actions → "Deploy to VPS" → Run workflow.
#
# One-time setup: GitHub → Settings → Environments → Create "production" (if missing)
#   → Required reviewers (add you / your team). Optional: restrict deployment branch to main.
#
# If "production" has no protection rules, the job runs immediately (same as before).
name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  # Runs first (no environment gate) so the run log shows where to click when deploy is waiting.
  approval-hint:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Where to approve (if deploy is waiting)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "If the next job (deploy) waits for you, GitHub does NOT put the button on the repo home page."
          echo ""
          echo "1) Stay on THIS workflow run (Deploy to VPS)."
          echo "2) In the LEFT sidebar, click the job named:  deploy   (not approval-hint)."
          echo "3) On the right, look for a yellow panel: 'Review pending deployments' or"
          echo "   'Waiting for approval' → click  Review deployments  → check  production  → Approve and deploy."
          echo ""
          echo "This run URL (bookmark it while waiting):"
          echo "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo ""
          echo "If you never see Review deployments: Settings → Environments → production"
          echo "→ ensure 'Required reviewers' is ON and your user is listed."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  deploy:
    needs: [approval-hint]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    # Only after green CI on main from a real push (not pull_request), or manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Deploy over SSH (git pull + rebuild + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            cd "$APP_DIR"

            # Snapshot current production commit before any change (rollback target).
            PREV_SHA="$(git rev-parse HEAD)"
            echo "Previous deploy SHA (rollback target): ${PREV_SHA}"

            rollback() {
              trap - ERR
              set +e
              echo ":: Deploy failed — rolling back to ${PREV_SHA} ::"
              cd "$APP_DIR" || { echo "Rollback: cannot cd to APP_DIR"; return 1; }
              git fetch --all --prune
              git checkout main
              git reset --hard "${PREV_SHA}"
              docker compose pull || true
              docker compose build
              docker compose up -d
              echo ":: Rollback complete; verify: git log -1 --oneline && docker compose ps ::"
            }

            fail_deploy() {
              echo ":: $1 ::"
              rollback
              exit 1
            }

            trap 'ec=$?; echo ":: Deploy step failed (exit ${ec}) ::"; rollback; exit "${ec}"' ERR

            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            docker compose pull || true
            docker compose build
            docker compose up -d

            docker compose ps

            # Report deployment from inside the VPS (avoids Nginx/public networking issues).
            if [ -n "${{ secrets.DEVORBIT_PROJECT_ID }}" ] && [ -n "${{ secrets.DEVORBIT_DEPLOY_TOKEN }}" ]; then
              # Secrets can accidentally include trailing newlines; sanitize before use.
              project_id="$(printf %s "${{ secrets.DEVORBIT_PROJECT_ID }}" | tr -d '\r\n')"
              deploy_token="$(printf %s "${{ secrets.DEVORBIT_DEPLOY_TOKEN }}" | tr -d '\r\n')"
              if ! echo "$project_id" | grep -Eq '^[a-f0-9]{24}$'; then
                echo "Invalid DEVORBIT_PROJECT_ID (expected 24-char hex Mongo ObjectId): $project_id"
                fail_deploy "Invalid DEVORBIT_PROJECT_ID"
              fi
              if [ -z "${deploy_token}" ]; then
                echo "Invalid DEVORBIT_DEPLOY_TOKEN (empty after trimming newlines)"
                fail_deploy "Invalid DEVORBIT_DEPLOY_TOKEN"
              fi

              echo "Waiting for API HTTP on http://127.0.0.1:4000/api/v1/health…"
              api_ready=0
              for _ in $(seq 1 90); do
                if curl -sf --connect-timeout 2 --max-time 5 "http://127.0.0.1:4000/api/v1/health" >/dev/null 2>&1; then
                  api_ready=1
                  break
                fi
                sleep 1
              done
              if [ "${api_ready}" -ne 1 ]; then
                echo "API did not respond on http://127.0.0.1:4000/api/v1/health within 90s — recent api logs:"
                docker compose logs api --tail 200 || true
                docker compose ps -a || true
                fail_deploy "API health check timeout"
              fi
              echo "Reporting deployment to local API (127.0.0.1:4000)…"
              echo "Report payload:"
              payload="$(jq -nc \
                --arg projectId "$project_id" \
                --arg platform "OVH" \
                --arg status "success" \
                --arg environment "production" \
                --arg branch "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}" \
                --arg commitSha "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" \
                --arg externalId "gh-${{ github.run_id }}" \
                '{projectId:$projectId,platform:$platform,status:$status,environment:$environment,branch:$branch,commitSha:$commitSha,externalId:$externalId,deployedAt:(now|todateiso8601)}' \
              )"
              echo "$payload"

              http_code="$(curl -sS -D /tmp/devorbit-report.headers -o /tmp/devorbit-report.body -w "%{http_code}" -X POST "http://127.0.0.1:4000/api/v1/deployments/report" \
                -H "Content-Type: application/json" \
                -H "x-devorbit-deploy-token: ${deploy_token}" \
                --data-binary "$payload" \
              )"
              echo "Devorbit report status: ${http_code}"
              echo "Devorbit report response headers:"
              cat /tmp/devorbit-report.headers || true
              echo "Devorbit report response body:"
              cat /tmp/devorbit-report.body || true
              if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
                echo "Devorbit deployment report failed"
                fail_deploy "Deployment report HTTP ${http_code}"
              fi
            else
              echo "Skipping Devorbit deployment report (missing DEVORBIT_PROJECT_ID / DEVORBIT_DEPLOY_TOKEN secrets)."
            fi

            trap - ERR
            echo "Deploy finished successfully."

