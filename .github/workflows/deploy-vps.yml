name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH (git pull + rebuild + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            docker compose pull || true
            docker compose build
            docker compose up -d

            docker compose ps
 
            # Report deployment from inside the VPS (avoids Nginx/public networking issues).
            if [ -n "${{ secrets.DEVORBIT_PROJECT_ID }}" ] && [ -n "${{ secrets.DEVORBIT_DEPLOY_TOKEN }}" ]; then
              echo "Reporting deployment to local API (127.0.0.1:4000)…"
              http_code="$(curl -sS -o /tmp/devorbit-report.json -w "%{http_code}" -X POST "http://127.0.0.1:4000/api/v1/deployments/report" \
                -H "Content-Type: application/json" \
                -H "x-devorbit-deploy-token: ${{ secrets.DEVORBIT_DEPLOY_TOKEN }}" \
                --data-binary "$(jq -nc \
                  --arg projectId "${{ secrets.DEVORBIT_PROJECT_ID }}" \
                  --arg platform "OVH" \
                  --arg status "success" \
                  --arg environment "production" \
                  --arg branch "${{ github.event.workflow_run.head_branch || github.ref_name }}" \
                  --arg commitSha "${{ github.event.workflow_run.head_sha || github.sha }}" \
                  --arg externalId "gh-${{ github.run_id }}" \
                  '{projectId:$projectId,platform:$platform,status:$status,environment:$environment,branch:$branch,commitSha:$commitSha,externalId:$externalId,deployedAt:(now|todateiso8601)}' \
                )" \
              )"
              echo "Devorbit report status: ${http_code}"
              cat /tmp/devorbit-report.json || true
              if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
                echo "Devorbit deployment report failed"
                exit 1
              fi
            else
              echo "Skipping Devorbit deployment report (missing DEVORBIT_PROJECT_ID / DEVORBIT_DEPLOY_TOKEN secrets)."
            fi

