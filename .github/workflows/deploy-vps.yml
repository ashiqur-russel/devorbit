name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH (git pull + rebuild + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            docker compose pull || true
            docker compose build
            docker compose up -d

            docker compose ps

      - name: Report deployment to Devorbit
        env:
          DEVORBIT_API_URL: ${{ secrets.DEVORBIT_API_URL }}
          DEVORBIT_PROJECT_ID: ${{ secrets.DEVORBIT_PROJECT_ID }}
          DEVORBIT_DEPLOY_TOKEN: ${{ secrets.DEVORBIT_DEPLOY_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${DEVORBIT_API_URL:-}" ] || [ -z "${DEVORBIT_PROJECT_ID:-}" ] || [ -z "${DEVORBIT_DEPLOY_TOKEN:-}" ]; then
            echo "Skipping Devorbit deployment report (missing DEVORBIT_* secrets)."
            exit 0
          fi
          curl -sS -X POST "${DEVORBIT_API_URL%/}/api/v1/deployments/report" \
            -H "Content-Type: application/json" \
            -H "x-devorbit-deploy-token: ${DEVORBIT_DEPLOY_TOKEN}" \
            --data-binary "$(jq -nc \
              --arg projectId "${DEVORBIT_PROJECT_ID}" \
              --arg platform "OVH" \
              --arg status "success" \
              --arg environment "production" \
              --arg branch "${HEAD_BRANCH}" \
              --arg commitSha "${HEAD_SHA}" \
              --arg externalId "gh-${RUN_ID}" \
              '{projectId:$projectId,platform:$platform,status:$status,environment:$environment,branch:$branch,commitSha:$commitSha,externalId:$externalId,deployedAt:(now|todateiso8601)}' \
            )"

