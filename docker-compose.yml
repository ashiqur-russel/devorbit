services:
  mongodb:
    image: mongo:7
    container_name: devorbit-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devorbit
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "quit(db.adminCommand('ping').ok ? 0 : 1)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: devorbit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  api:
    build:
      context: ./
      dockerfile: apps/api/Dockerfile
      # Linux: use host network for build so npm/registry works like on the VPS shell.
      network: host
    # OVH / some hosts: bridge containers cannot reach the public internet (EHOSTUNREACH to GitHub).
    # Host network uses the same routing as the VM — OAuth token exchange then works.
    network_mode: host
    container_name: devorbit-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS --connect-timeout 2 --max-time 5 http://127.0.0.1:4000/api/v1/health -o /dev/null',
        ]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 60s
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://127.0.0.1:27017/devorbit
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-Devorbit <onboarding@resend.dev>}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-}

  web:
    build:
      context: ./
      dockerfile: apps/web/Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:4000}
    container_name: devorbit-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:4000}

volumes:
  mongodb_data:
  redis_data:
