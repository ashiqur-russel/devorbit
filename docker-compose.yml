services:
  mongodb:
    image: mongo:7
    container_name: devorbit-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devorbit

  redis:
    image: redis:7-alpine
    container_name: devorbit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./
      dockerfile: apps/api/Dockerfile
      # Linux: use host network for build so npm/registry works like on the VPS shell.
      network: host
    container_name: devorbit-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/devorbit
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      WEB_URL: ${WEB_URL:-http://localhost:3000}

  web:
    build:
      context: ./
      dockerfile: apps/web/Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:4000}
    container_name: devorbit-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:4000}

volumes:
  mongodb_data:
  redis_data:
