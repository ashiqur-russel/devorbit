# DevOrbit — Nginx reverse proxy (single public IP, port 80)
#
# Docker must listen on 127.0.0.1:3000 (web) and 127.0.0.1:4000 (api).
# If compose publishes 0.0.0.0:3000, this still works (nginx connects to localhost).
# Map published ports to localhost only in docker-compose if you want (see README).
#
# Install on Ubuntu:
#   sudo apt update && sudo apt install -y nginx
#   sudo cp deploy/nginx/devorbit.conf /etc/nginx/sites-available/devorbit
#   sudo ln -sf /etc/nginx/sites-available/devorbit /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# .env (then rebuild web): WEB_URL/API_URL = http://YOUR_PUBLIC_IP  (no :3000 / :4000)
#   WS_URL=ws://YOUR_PUBLIC_IP
#   GITHUB_CALLBACK_URL=http://YOUR_PUBLIC_IP/api/v1/auth/github/callback

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream devorbit_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream devorbit_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Nest: REST (/api/v1/...) + Swagger (/api/...)
    location /api/ {
        proxy_pass http://devorbit_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Socket.io (Nest WebSocketGateway on same port as HTTP)
    location /socket.io/ {
        proxy_pass http://devorbit_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Next.js (app + RSC + HMR-style long polls if any)
    location / {
        proxy_pass http://devorbit_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
